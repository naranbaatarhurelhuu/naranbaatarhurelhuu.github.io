<!DOCTYPE html>
<html>
<head>
  <title>MSTORE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    /* LOGO */
    .logo {
      position: absolute;
      top: 10px;
      left: 15px;
      color: white;
      font-size: 24px;
      font-weight: bold;
      z-index: 10;
    }

    /* BANNER */
    .banner {
      width: 100%;
      height: 300px;
      overflow: hidden;
      position: relative;
    }

    .slides {
      display: flex;
      width: 300%;
      animation: slide 9s infinite;
    }

    .slides img {
      width: 100%;
      height: 300px;
      object-fit: cover;
    }

    @keyframes slide {
      0% { transform: translateX(0); }
      33% { transform: translateX(0); }
      36% { transform: translateX(-100%); }
      66% { transform: translateX(-100%); }
      69% { transform: translateX(-200%); }
      100% { transform: translateX(-200%); }
    }

    /* PRODUCT TITLE */
    h2 {
      text-align: center;
      margin-top: 30px;
    }

    /* PRODUCT CAROUSEL */
    .product-container {
      overflow: hidden;
      white-space: nowrap;
      padding: 20px;
    }

    .product-track {
      display: inline-block;
      animation: scroll 20s linear infinite;
    }

    .product {
      display: inline-block;
      width: 200px;
      margin: 10px;
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }

    .product img {
      width: 100%;
    }

    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    a {
      display: inline-block;
      padding: 8px 15px;
      background: black;
      color: white;
      text-decoration: none;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<!-- LOGO -->
<div class="logo">MSTORE</div>

<!-- BANNER -->
<div class="banner">
  <div class="slides">
    <img src="https://picsum.photos/id/1018/1200/300">
    <img src="https://picsum.photos/id/1015/1200/300">
    <img src="https://picsum.photos/id/1019/1200/300">
  </div>
</div>

<!-- PRODUCTS -->
<h2>Шинэ бүтээгдэхүүн</h2>

<div class="product-container">
  <div class="product-track">

    <div class="product">
      <img src="https://picsum.photos/200?1">
      <h3>Beanbag 1</h3>
      <p>150,000₮</p>
      <a href="#">Авах</a>
    </div>

    <div class="product">
      <img src="https://picsum.photos/200?2">
      <h3>Beanbag 2</h3>
      <p>180,000₮</p>
      <a href="#">Авах</a>
    </div>

    <div class="product">
      <img src="https://picsum.photos/200?3">
      <h3>Beanbag 3</h3>
      <p>200,000₮</p>
      <a href="#">Авах</a>
    </div>

    <div class="product">
      <img src="https://picsum.photos/200?4">
      <h3>Beanbag 4</h3>
      <p>170,000₮</p>
      <a href="#">Авах</a>
    </div>

    <!-- DUPLICATE for smooth loop -->
    <div class="product">
      <img src="https://picsum.photos/200?1">
      <h3>Beanbag 1</h3>
      <p>150,000₮</p>
      <a href="#">Авах</a>
    </div>

    <div class="product">
      <img src="https://picsum.photos/200?2">
      <h3>Beanbag 2</h3>
      <p>180,000₮</p>
      <a href="#">Авах</a>
    </div>

  </div>
</div>

</body>
</html>
